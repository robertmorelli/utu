<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Utu Playground</title>
  <script type="importmap">{"imports": {"web-tree-sitter": "./web-tree-sitter.js"}}</script>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #111;
      color: #eee;
    }

    textarea {
      width: 100%;
      height: 300px;
      background: #1a1a1a;
      color: #eee;
      border: 1px solid #333;
      padding: 10px;
      font-family: monospace;
      font-size: 14px;
    }

    button {
      margin-top: 8px;
      padding: 8px 20px;
      cursor: pointer;
    }

    pre {
      margin-top: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 10px;
      min-height: 60px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <h2>Utu Playground</h2>
  <textarea id="src">import extern "es" console_log(str)

export fn main() {
    "hello from utu" -o console_log
}</textarea>
  <br><button onclick="run()">Run</button>
  <pre id="out"></pre>
  <script type="module">
    import { compile } from './index.mjs';
    window.run = async () => {
      const out = document.getElementById('out');
      out.textContent = '';
      try {
        const { js, wasm } = await compile(document.getElementById('src').value, { wasmUrl: new URL('./tree-sitter-utu.wasm', import.meta.url) });
        const blob = new Blob([js], { type: 'application/javascript' });
        const { instantiate } = await import(URL.createObjectURL(blob));
        const exports = await instantiate({ console_log: s => out.textContent += s + '\n' });
        exports.main?.();
      } catch (e) {
        out.textContent = 'Error: ' + e.message;
      }
    };
  </script>
</body>

</html>
