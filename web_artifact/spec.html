<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utu Language Specification</title>
  <style>
    body {
      margin: 0 auto;
      max-width: 960px;
      padding: 24px 16px 48px;
      font: 16px/1.5 system-ui, sans-serif;
      color: #111;
      background: #f3f3f3;
    }

    a {
      color: inherit;
    }

    nav,
    .sections {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    nav {
      margin-bottom: 16px;
      font-size: 14px;
    }

    h1,
    h2,
    p {
      margin: 0 0 12px;
    }

    .sections {
      margin: 16px 0 24px;
      font-size: 14px;
    }

    .section {
      margin-bottom: 24px;
    }

    .page {
      max-width: 820px;
      margin: 0 auto 16px;
      padding: 10px;
      border: 1px solid #d0d0d0;
      background: #fff;
    }

    .page img {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
    }

    .page a {
      display: inline-block;
      margin-top: 8px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <nav>
    <a href="./docs.html">guide docs</a>
    <a href="../index.html">playground</a>
  </nav>

  <h1>Utu language specification</h1>
  <p>Canonical Typst extraction of the language spec. This page renders the spec as a normal scrolling document.</p>

  <div class="sections" id="section-links"></div>
  <main id="viewer"></main>

  <script>
    const sections = [
      ["overview", "1. Overview", [2]],
      ["type-system", "2. Type System", [3, 4, 5, 6]],
      ["strings", "3. Strings", [7]],
      ["memory", "4. Memory Model", [8]],
      ["control-flow", "5. Control Flow", [9, 10]],
      ["functions", "6. Functions and Pipes", [11, 12]],
      ["imports", "7. Imports and Exports", [13]],
      ["dispatch", "8. Polymorphic Dispatch", [14]],
      ["builtins", "9. Builtin Operations", [15]],
      ["required-wasm", "10. Required Wasm Instructions", [16, 17]],
      ["grammar", "11. Grammar", [18, 19, 20]],
      ["compilation", "12. Compilation Model", [21]],
      ["example", "13. Complete Example", [22, 23]],
    ];

    const links = document.getElementById("section-links");
    const viewer = document.getElementById("viewer");

    function pageMarkup(page) {
      const n = String(page).padStart(2, "0");
      return `
        <figure class="page">
          <img loading="lazy" src="./spec-pages/page-${n}.svg" alt="Specification page ${n}">
          <a href="./spec-pages/page-${n}.svg">open page ${n}</a>
        </figure>
      `;
    }

    links.innerHTML = sections
      .map(([id, title]) => `<a href="#${id}">${title}</a>`)
      .join("");

    viewer.innerHTML = sections
      .map(([id, title, pages]) => `
        <section class="section" id="${id}">
          <h2>${title}</h2>
          ${pages.map(pageMarkup).join("")}
        </section>
      `)
      .join("");
  </script>
</body>

</html>
