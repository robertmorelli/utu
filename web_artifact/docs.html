<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utu Docs</title>
  <style>
    body {
      margin: 0 auto;
      max-width: 960px;
      padding: 24px 16px 48px;
      font: 16px/1.5 system-ui, sans-serif;
      color: #111;
      background: #f3f3f3;
    }

    a {
      color: inherit;
    }

    nav,
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    nav {
      margin-bottom: 16px;
      font-size: 14px;
    }

    h1,
    h2,
    p {
      margin: 0 0 12px;
    }

    .tabs {
      margin: 16px 0;
    }

    .tabs button {
      border: 1px solid #bbb;
      background: #fff;
      padding: 8px 12px;
      cursor: pointer;
      font: inherit;
    }

    .tabs button.active {
      font-weight: 600;
      border-color: #111;
    }

    .page {
      max-width: 820px;
      margin: 0 auto 16px;
      padding: 10px;
      border: 1px solid #d0d0d0;
      background: #fff;
    }

    .page img {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
    }

    .page a {
      display: inline-block;
      margin-top: 8px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <nav>
    <a href="./spec.html">canonical spec</a>
    <a href="./index.html">playground</a>
  </nav>

  <h1>Utu docs</h1>
  <p>Guide docs rendered from Typst SVGs. Choose a section, then scroll the pages like a normal document viewer.</p>

  <div class="tabs" id="tabs"></div>
  <section id="viewer"></section>

  <script>
    const sections = [
      ["overview", "Overview", "Overview and type system", "Design principles, types, nullability, exclusive disjunction, and multi-value returns.", [2, 3, 4, 5]],
      ["strings", "Strings", "Strings and memory", "Host-backed strings, JS String Builtins, and the GC-only memory model.", [6, 7]],
      ["flow", "Flow", "Control flow, functions, and interop", "Conditionals, loops, pipes, bindings, imports, exports, and dispatch.", [8, 9, 10, 11]],
      ["builtins", "Builtins", "Builtins and required Wasm surface", "Builtin operations and the Wasm instructions the compiler must emit.", [12, 13, 14]],
      ["grammar", "Grammar", "Grammar and compilation model", "EBNF plus lowering rules for types, functions, error returns, and the else operator.", [15, 16, 17, 18, 19]],
      ["example", "Example", "Complete example walkthrough", "A compact program that exercises the main language surface.", [20, 21]],
      ["codegen", "Codegen", "Codegen guide: Utu beside WAT", "Side-by-side Utu and WAT examples showing expected lowering shapes.", [22, 23, 24, 25, 26]],
    ];

    const tabs = document.getElementById("tabs");
    const viewer = document.getElementById("viewer");

    function pageMarkup(page) {
      const n = String(page).padStart(2, "0");
      return `
        <figure class="page">
          <img loading="lazy" src="./docs-pages/page-${n}.svg" alt="Documentation page ${n}">
          <a href="./docs-pages/page-${n}.svg">open page ${n}</a>
        </figure>
      `;
    }

    function render(id) {
      const section = sections.find(([key]) => key === id) || sections[0];
      const [key, , title, summary, pages] = section;
      history.replaceState(null, "", `#${key}`);

      tabs.innerHTML = sections
        .map(([sectionId, label]) => `<button type="button" data-id="${sectionId}" class="${sectionId === key ? "active" : ""}">${label}</button>`)
        .join("");

      viewer.innerHTML = `
        <h2>${title}</h2>
        <p>${summary}</p>
        ${pages.map(pageMarkup).join("")}
      `;

      tabs.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => render(button.dataset.id));
      });
    }

    render(location.hash.slice(1) || sections[0][0]);
  </script>
</body>

</html>
