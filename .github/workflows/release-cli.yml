name: Release CLI

on:
  workflow_dispatch:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: read

jobs:
  release-cli:
    runs-on: ubuntu-latest
    container:
      image: fedora:42
    timeout-minutes: 15

    steps:
      - name: Install Fedora dependencies
        run: dnf install -y findutils gcc-c++ git make python3 tar gzip unzip which xz

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build everything
        run: bun run build

      - name: Run full test suite
        run: bun run test

      - name: Verify CLI artifacts
        run: |
          test -f ./dist/cli-package/cli.js
          test -f ./utu

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: utu-cli-release
          path: |
            dist/cli-package/**
            utu
