name: Example Tests

on:
  pull_request:
  workflow_dispatch:
    inputs:
      suite:
        description: Example suite to run
        type: choice
        options:
          - smoke
          - all
        default: smoke

permissions:
  contents: read

jobs:
  examples:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Select suite
        id: suite
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.suite }}" == "all" ]]; then
            echo "command=bun run test:examples:all --report-file .artifacts/example-report.json" >> "$GITHUB_OUTPUT"
          else
            echo "command=bun run test:examples --report-file .artifacts/example-report.json" >> "$GITHUB_OUTPUT"
          fi

      - name: Run example suite
        run: ${{ steps.suite.outputs.command }}

      - name: Upload example report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: example-test-report
          path: .artifacts/example-report.json
          if-no-files-found: warn
