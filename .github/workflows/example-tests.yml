name: Example Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  examples-fedora:
    name: Example Suite (Fedora 42, Bun latest)
    runs-on: ubuntu-latest
    container:
      image: fedora:42
    timeout-minutes: 25

    steps:
      - name: Install Fedora dependencies
        run: dnf install -y findutils gcc-c++ git make python3 tar gzip unzip which xz

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run full test suite
        run: bun run test

  examples-macos:
    name: Example Suite (macOS latest, Bun latest)
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run full test suite
        run: bun run test
