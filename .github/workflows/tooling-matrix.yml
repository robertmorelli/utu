name: Tooling Matrix

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tooling-fedora:
    name: Tooling (Fedora 42, Node 24)
    runs-on: ubuntu-latest
    container:
      image: fedora:42
    timeout-minutes: 20

    steps:
      - name: Install Fedora dependencies
        run: dnf install -y findutils gcc-c++ git make python3 tar gzip unzip which xz

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build everything
        run: bun run build

      - name: Run full test suite
        run: bun run test

      - name: Verify desktop activation
        run: bash ./scripts/test-vscode-desktop-activation.sh

  tooling-macos:
    name: Tooling (macOS latest, Node 24)
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build everything
        run: bun run build

      - name: Run full test suite
        run: bun run test
