name: CLI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli-fedora:
    name: CLI (Fedora 42, Bun latest)
    runs-on: ubuntu-latest
    container:
      image: fedora:42
    timeout-minutes: 15
    defaults:
      run:
        shell: bash

    steps:
      - name: Install Fedora dependencies
        run: dnf install -y findutils gcc-c++ git make python3 tar gzip unzip which xz

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Check help text
        run: |
          output="$(bun ./cli.mjs help)"
          echo "$output"
          grep -Fq 'utu compile <input> [--outdir <dir>] [--wat] [--bun|--node]' <<<"$output"
          grep -Fq 'utu run <input>' <<<"$output"

      - name: Check usage errors
        run: |
          set +e
          output="$(bun ./cli.mjs compile 2>&1)"
          exit_code=$?
          set -e
          echo "$output"
          test $exit_code -ne 0
          grep -Fq 'compile needs an input file' <<<"$output"

          set +e
          output="$(bun ./cli.mjs nope 2>&1)"
          exit_code=$?
          set -e
          echo "$output"
          test $exit_code -ne 0
          grep -Fq "ENOENT: no such file or directory" <<<"$output"

      - name: Compile Node output explicitly
        run: |
          rm -rf dist/ci-node
          output="$(bun ./cli.mjs compile ./examples/call_simple.utu --outdir ./dist/ci-node --node 2>&1)"
          echo "$output"
          grep -Fq 'call_simple.mjs' <<<"$output"
          grep -Fq 'call_simple.wasm' <<<"$output"
          ! grep -Fq 'call_simple.wat' <<<"$output"

      - name: Compile with source CLI
        run: |
          rm -rf dist/ci-src
          bun ./cli.mjs compile ./examples/call_simple.utu --outdir ./dist/ci-src --wat
          test -f dist/ci-src/call_simple.mjs
          test -f dist/ci-src/call_simple.wasm
          test -f dist/ci-src/call_simple.wat

      - name: Build bundled CLI
        run: |
          bun run build
          test -f ./dist/cli-package/cli.js
          test -f ./utu

      - name: Compile Bun executable
        run: |
          rm -rf dist/ci-bun
          bun ./cli.mjs compile ./examples/call_simple.utu --outdir ./dist/ci-bun --bun
          test -f dist/ci-bun/call_simple

      - name: Compile with bundled CLI
        run: |
          rm -rf dist/ci-bundle
          ./utu compile ./examples/call_simple.utu --outdir ./dist/ci-bundle --wat
          test -f dist/ci-bundle/call_simple.mjs
          test -f dist/ci-bundle/call_simple.wasm
          test -f dist/ci-bundle/call_simple.wat

      - name: Run Bun executable
        run: |
          output="$(./dist/ci-bun/call_simple 2>&1)"
          echo "$output"
          grep -Fxq '177280n' <<<"$output"

      - name: Run with source CLI
        run: |
          output="$(bun ./cli.mjs run ./examples/call_simple.utu 2>&1)"
          echo "$output"
          grep -Fxq '177280n' <<<"$output"

      - name: Run with bundled CLI
        run: |
          output="$(./utu run ./examples/call_simple.utu 2>&1)"
          echo "$output"
          grep -Fxq '177280n' <<<"$output"

      - name: Test with source CLI
        run: |
          output="$(bun ./cli.mjs test ./examples/ci/tests_basic.utu 2>&1)"
          echo "$output"
          grep -Fq 'PASS adds two numbers' <<<"$output"
          grep -Fq 'PASS adds negatives' <<<"$output"

      - name: Test with bundled CLI
        run: |
          output="$(./utu test ./examples/ci/tests_basic.utu 2>&1)"
          echo "$output"
          grep -Fq 'PASS adds two numbers' <<<"$output"
          grep -Fq 'PASS adds negatives' <<<"$output"

      - name: Bench with source CLI
        run: |
          output="$(bun ./cli.mjs bench ./examples/bench/bench_basic.utu --seconds 0.01 --samples 1 --warmup 0 2>&1)"
          echo "$output"
          grep -Fq 'sum loop:' <<<"$output"

      - name: Bench with bundled CLI
        run: |
          output="$(./utu bench ./examples/bench/bench_basic.utu --seconds 0.01 --samples 1 --warmup 0 2>&1)"
          echo "$output"
          grep -Fq 'sum loop:' <<<"$output"

