name: CLI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
        working-directory: cli_artifact

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17

      - name: Install dependencies
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Check help text
        run: |
          output="$(bun ./src/cli.mjs help)"
          echo "$output"
          grep -Fq 'utu compile <input> [--outdir <dir>] [--wat] [--bun]' <<<"$output"
          grep -Fq 'utu run <input>' <<<"$output"

      - name: Check usage errors
        run: |
          set +e
          output="$(bun ./src/cli.mjs compile 2>&1)"
          exit_code=$?
          set -e
          echo "$output"
          test $exit_code -ne 0
          grep -Fq 'compile needs an input file' <<<"$output"

          set +e
          output="$(bun ./src/cli.mjs nope 2>&1)"
          exit_code=$?
          set -e
          echo "$output"
          test $exit_code -ne 0
          grep -Fq 'Unknown command "nope"' <<<"$output"

          set +e
          output="$(bun ./src/cli.mjs compile ../examples/call_simple.utu --outdir ./dist/ci-node --node 2>&1)"
          exit_code=$?
          set -e
          echo "$output"
          test $exit_code -ne 0
          grep -Fq 'compile only supports --wat and --bun' <<<"$output"

      - name: Compile with source CLI
        run: |
          rm -rf dist/ci-src
          bun ./src/cli.mjs compile ../examples/call_simple.utu --outdir ./dist/ci-src --wat
          test -f dist/ci-src/call_simple.mjs
          test -f dist/ci-src/call_simple.wasm
          test -f dist/ci-src/call_simple.wat

      - name: Build bundled CLI
        run: bun run build

      - name: Compile Bun executable
        run: |
          rm -rf dist/ci-bun
          bun ./src/cli.mjs compile ../examples/call_simple.utu --outdir ./dist/ci-bun --bun
          test -f dist/ci-bun/call_simple

      - name: Compile with bundled CLI
        run: |
          rm -rf dist/ci-bundle
          bun ./dist/utu.mjs compile ../examples/call_simple.utu --outdir ./dist/ci-bundle --wat
          test -f dist/ci-bundle/call_simple.mjs
          test -f dist/ci-bundle/call_simple.wasm
          test -f dist/ci-bundle/call_simple.wat

      - name: Run Bun executable
        run: |
          set +e
          output="$(./dist/ci-bun/call_simple 2>&1)"
          exit_code=$?
          set -e
          echo "$output"
          if [[ $exit_code -eq 0 ]]; then
            exit 0
          fi
          grep -Eq 'Compiled wasm could not be compiled in Bun|Compiled wasm failed to instantiate in Bun|The program does not export a callable main function|WebAssembly.Module doesn'\''t validate' <<<"$output"

      - name: Run with source CLI
        run: |
          set +e
          output="$(bun ./src/cli.mjs run ../examples/call_simple.utu 2>&1)"
          exit_code=$?
          set -e
          echo "$output"
          if [[ $exit_code -eq 0 ]]; then
            exit 0
          fi
          grep -Eq 'Compiled wasm could not be compiled in Bun|Compiled wasm failed to instantiate in Bun|The program does not export a callable main function|WebAssembly.Module doesn'\''t validate' <<<"$output"

      - name: Run with bundled CLI
        run: |
          set +e
          output="$(bun ./dist/utu.mjs run ../examples/call_simple.utu 2>&1)"
          exit_code=$?
          set -e
          echo "$output"
          if [[ $exit_code -eq 0 ]]; then
            exit 0
          fi
          grep -Eq 'Compiled wasm could not be compiled in Bun|Compiled wasm failed to instantiate in Bun|The program does not export a callable main function|WebAssembly.Module doesn'\''t validate' <<<"$output"
