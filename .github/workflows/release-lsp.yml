name: Release LSP

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the LSP package to npm
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'lsp-v*'

permissions:
  contents: read

jobs:
  release-lsp:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.17

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run full test suite
        run: bun run test

      - name: Build grammar artifact
        run: bun run grammar

      - name: Validate LSP/editor core
        run: bun scripts/test-editor-core.mjs

      - name: Build LSP package
        working-directory: lsp
        run: |
          npm run build
          test -f ./dist/utu-lsp.js
          test -f ./dist/tree-sitter-utu.wasm
          test -f ./dist/web-tree-sitter.wasm

      - name: Pack npm tarball
        working-directory: lsp
        run: npm pack --pack-destination ./artifacts

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: utu-lsp-release
          path: lsp/artifacts/*.tgz

      - name: Publish LSP package
        if: github.event_name == 'push' || inputs.publish
        working-directory: lsp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
