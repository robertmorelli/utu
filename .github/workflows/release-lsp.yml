name: Release LSP

on:
  workflow_dispatch:
  push:
    tags:
      - 'lsp-v*'

permissions:
  contents: read

jobs:
  release-lsp:
    runs-on: ubuntu-latest
    container:
      image: fedora:42
    timeout-minutes: 15

    steps:
      - name: Install Fedora dependencies
        run: dnf install -y findutils gcc-c++ git make python3 tar gzip unzip which xz

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build everything
        run: bun run build

      - name: Run full test suite
        run: bun run test

      - name: Verify LSP artifacts
        run: |
          test -f ./utu-lsp
          test -f ./tree-sitter-utu.wasm
          test -f ./web-tree-sitter.wasm

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: utu-lsp-release
          path: |
            utu-lsp
            tree-sitter-utu.wasm
            web-tree-sitter.wasm
