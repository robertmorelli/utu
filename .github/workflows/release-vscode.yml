name: Release VS Code Extension

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the VS Code extension to the Marketplace
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'vscode-v*'

permissions:
  contents: read

jobs:
  release-vscode:
    runs-on: ubuntu-latest
    container:
      image: fedora:42
    timeout-minutes: 20

    steps:
      - name: Install Fedora dependencies
        run: dnf install -y findutils gcc-c++ git make python3 tar gzip unzip which xz

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build everything
        run: bun run build

      - name: Run full test suite
        run: bun run test

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: utu-vscode-vsix
          path: dist/*.vsix

      - name: Publish to VS Code Marketplace
        if: github.event_name == 'push' || inputs.publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: ./node_modules/.bin/vsce publish --no-dependencies
